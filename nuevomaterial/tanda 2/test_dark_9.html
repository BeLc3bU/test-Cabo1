<script>
// 10 temas × 3 preguntas = 30 en total
const QS=[

// ── T1: ORGANIZACIONES INTERNACIONALES (1-3) ──
{t:"T1 · Org. Internacionales",gi:0,trap:false,
q:"¿Cuál es el órgano de la ONU que dirime controversias entre estados con fallos inapelables, está compuesto por 15 jueces y tiene su sede en La Haya?",
opts:["El Consejo de Seguridad","El Secretariado","La Corte Internacional de Justicia","El ECOSOC"],
a:2,exp:"La Corte Internacional de Justicia (CIJ) es el principal órgano judicial de la ONU. Sus 15 jueces son elegidos por la Asamblea General y el Consejo de Seguridad. Sus fallos son inapelables y dirime solo controversias entre estados."},

{t:"T1 · Org. Internacionales",gi:0,trap:true,
q:"⚠ Trampa — El Tratado de la OTAN tiene 14 artículos. ¿Cuál describe el compromiso de autodefensa colectiva y cuál permite invitar a nuevos estados europeos?",
opts:["Art. 3 autodefensa — Art. 5 nuevos estados","Art. 5 autodefensa — Art. 10 nuevos estados","Art. 10 autodefensa — Art. 14 nuevos estados","Art. 1 autodefensa — Art. 5 nuevos estados"],
a:1,exp:"El Art. 5 es el famoso artículo de autodefensa colectiva. El Art. 10 permite invitar a nuevos estados europeos por acuerdo unánime. Son los dos artículos más importantes del Tratado y es muy fácil confundirlos."},

{t:"T1 · Org. Internacionales",gi:0,trap:false,
q:"¿Qué organismo de la UE está formado por los dirigentes de los países miembros y se reúne para plantear la estrategia común, distinto del que aprueba las leyes?",
opts:["La Comisión Europea","El Parlamento Europeo","El Consejo de la UE","El Consejo Europeo"],
a:3,exp:"El Consejo Europeo reúne a los dirigentes (jefes de Estado o de Gobierno) para fijar la estrategia común de la UE. No debe confundirse con el Consejo de la UE, que reúne a los ministros para aprobar leyes."},

// ── T2: APOYO PSICOLÓGICO (4-6) ──
{t:"T2 · Apoyo psicológico",gi:1,trap:false,
q:"¿Qué clasifica a una persona como víctima de 'tercer grado' en el sistema de clasificación de víctimas de una catástrofe?",
opts:["Ser familiar directo de un afectado","Ser miembro de los equipos intervinientes","Pertenecer a la comunidad afectada","Conocer el suceso por los medios de comunicación"],
a:1,exp:"Las víctimas de 3.er grado son los equipos intervinientes: bomberos, sanitarios, fuerzas de seguridad, psicólogos de emergencia, etc. Soportan una alta carga de estrés por su exposición directa al suceso."},

{t:"T2 · Apoyo psicológico",gi:1,trap:false,
q:"La primera fase de la crisis psicológica es el Shock. ¿Cuáles son exactamente las cuatro esferas que afecta?",
opts:["Emocional, social, laboral y física","Emoción, cognición, fisiológico y motor","Cognitiva, conductual, afectiva y social","Sensorial, motora, verbal y emocional"],
a:1,exp:"La 1.ª fase de shock afecta simultáneamente a cuatro esferas: emoción, cognición, fisiológico y motor. La 2.ª fase (Reacción) provoca reacciones emocionales intensas, enfado/odio y pérdida de creencias y valores."},

{t:"T2 · Apoyo psicológico",gi:1,trap:true,
q:"⚠ Trampa — ¿Cuál de estos principios de intervención psicológica hace referencia a reestructurar las experiencias de la víctima?",
opts:["Proximidad","Inmediatez","Unidad","Simplicidad"],
a:2,exp:"'Unidad' en el temario significa reestructurar las experiencias vividas. No confundir con Proximidad (atención cerca del lugar), Inmediatez (actuar sin demora) ni Simplicidad (métodos breves y sencillos)."},

// ── T3: MATERIAL AÉREO (7-9) ──
{t:"T3 · Material aéreo",gi:2,trap:false,
q:"¿Cuál es la designación española, el nombre popular y la base de operaciones del caza polivalente que opera desde el ALA 15 en Zaragoza y el ALA 12 en Torrejón?",
opts:["C.16 — Eurofighter — BA Morón","C.15 — F-18 Hornet — BA Zaragoza y BA Torrejón","T.21 — C-295 — BA Getafe","E.25 — C-101 Mirlo — BA Matacán"],
a:1,exp:"El F-18 Hornet tiene la designación española C.15 (modernizado como C.15M). Opera desde BA Zaragoza (ALA 15), BA Torrejón (CLAEX y ALA 12) y BA Gando (ALA 46)."},

{t:"T3 · Material aéreo",gi:2,trap:false,
q:"¿Qué aeronave del EA se usa para enseñanza básica de helicópteros, tiene designación HE.25 y opera desde la Escuela de Helicópteros en BA Armilla?",
opts:["AS-332 Superpuma","Sikorsky S-76","EC-120 Colibrí","NH-90"],
a:2,exp:"El EC-120 'Colibrí' (HE.25) se usa para enseñanza básica de helicópteros y opera desde BA Armilla junto al Sikorsky S-76 (HE.24, enseñanza avanzada), ambos en la Escuela de Helicópteros del ALA 78."},

{t:"T3 · Material aéreo",gi:2,trap:true,
q:"⚠ Trampa — En las matrículas del EA, ¿qué significa el símbolo de misión básica 'U'?",
opts:["Unidad de combate","Utilitario","Unmanned (no tripulado)","Unificado de transporte"],
a:1,exp:"En el sistema de matrículas del EA, 'U' = Utilitario (misión básica). 'N' es el símbolo de tipo para aeronaves No tripuladas. Ejemplo: el Beechcraft C-90 tiene designación U.22 (Utilitario tipo 22)."},

// ── T4: HISTORIA DE LA AVIACIÓN ESPAÑOLA (10-12) ──
{t:"T4 · Historia aviación",gi:3,trap:false,
q:"¿En qué año se realizó el primer vuelo de autogiro en España, quién fue su inventor y desde qué base se realizó?",
opts:["1920 — Kindelán — Los Alcázares","1923 — Juan de la Cierva — Getafe","1926 — Ramón Franco — Cuatro Vientos","1915 — Infante Alfonso — San Javier"],
a:1,exp:"En 1923 se realizó el primer vuelo de autogiro, inventado por Juan de la Cierva, desde Getafe. Ese mismo año también se realizó el primer vuelo Península-Las Palmas."},

{t:"T4 · Historia aviación",gi:3,trap:false,
q:"Durante la Guerra Civil, ¿qué bombardeo sobre una ciudad vasca fue especialmente significativo y qué obra de arte universal inspiró?",
opts:["Bombardeo de Bilbao — inspiró 'El Guernica' de Dalí","Bombardeo de Guernica — inspiró el Guernica de Pablo Picasso","Bombardeo de Santander — inspiró una obra de Miró","Bombardeo de San Sebastián — inspiró la sinfonía de Falla"],
a:1,exp:"El bombardeo de Guernica, realizado con aviones alemanes Heinkel He-111 y Ju-52 de la Legión Cóndor, inspiró la famosa obra 'Guernica' de Pablo Picasso, símbolo universal contra la guerra."},

{t:"T4 · Historia aviación",gi:3,trap:true,
q:"⚠ Trampa — ¿En qué año llegó el primer reactor de diseño y fabricación puramente nacional al Ejército del Aire y cómo se llamaba?",
opts:["1953 — F-86 Sabre","1960 — F-104 Starfighter","1965 — HA-200 Saeta (E-14)","1971 — F-4 Phantom"],
a:2,exp:"El HA-200 Saeta (E-14) llegó al EA en 1965 y fue el primer reactor de diseño y fabricación puramente nacional. Se usó como entrenador en la Escuela Básica de Matacán y después en la AGA. El F-86 (1955) y el F-104 (1960) eran americanos."},

// ── T5: DINÁMICA DE GRUPOS (13-15) ──
{t:"T5 · Dinámica de grupos",gi:4,trap:false,
q:"¿Qué autor y en qué publicación estableció en 1990 las tres condiciones que debe cumplir un colectivo para convertirse en grupo?",
opts:["Worchel en 1984 — modelo cíclico","Bar-Tal en 1990 — definición de grupo","Moreland y Levine en 1989 — socialización grupal","Kurt Lewin antes de la WWII — teoría de campo"],
a:1,exp:"Bar-Tal (1990) estableció que para que un colectivo sea un grupo sus componentes deben definirse como miembros del grupo, compartir creencias grupales y existir actividad coordinada entre ellos."},

{t:"T5 · Dinámica de grupos",gi:4,trap:false,
q:"¿Cuáles son las tres categorías de ilusiones del 'pensamiento grupal' de Janis relacionadas con la capacidad del grupo para abordar problemas?",
opts:["Ilusión de superioridad, de control y de permanencia","Ilusión de invulnerabilidad e ilusión de unanimidad","Ilusión de liderazgo, de consenso y de eficacia","Ilusión de cohesión, de neutralidad y de objetividad"],
a:1,exp:"Janis distingue dos ilusiones compartidas relacionadas con la capacidad de abordar problemas: la ilusión de invulnerabilidad (el grupo cree que no puede fallar) y la ilusión de unanimidad (se sobreestima el acuerdo interno). Estas forman la 2.ª categoría de las 3 que describe."},

{t:"T5 · Dinámica de grupos",gi:4,trap:true,
q:"⚠ Trampa — ¿Cuántas fases tiene el modelo de socialización grupal de Moreland y Levine y cómo se llama la última?",
opts:["4 fases — Fase de resolución","5 fases — Fase de recuerdo (remembrance)","6 fases — Fase de declive","3 fases — Fase de mantenimiento"],
a:1,exp:"El modelo de Moreland y Levine (1984/1989) tiene 5 fases: investigación, socialización, mantenimiento, resolución y recuerdo (remembrance). No confundir con el modelo de Worchel, que tiene 6 fases y describe la formación del grupo, no la socialización individual."},

// ── T6: EXPRESIÓN ORAL (16-18) ──
{t:"T6 · Expresión oral",gi:5,trap:false,
q:"¿Cuál de estas clasificaciones de la comunicación corresponde a la dimensión 'según el contexto'?",
opts:["Verbal / no verbal / electrónica","Intrapersonal / interpersonal / grupal / pública","Formal / informal","Culta / estándar / coloquial / popular"],
a:2,exp:"La clasificación 'según el contexto' distingue entre Formal (sujeta a normas y papeles establecidos) e Informal (espontánea y natural). La verbal/no verbal es 'según el medio'; la culta/coloquial es 'por el tratamiento del lenguaje'; la interpersonal es 'según emisor/receptor'."},

{t:"T6 · Expresión oral",gi:5,trap:false,
q:"¿Qué herramienta de comunicación consiste en defender las propias opiniones de forma razonada, evitando reacciones emocionales, hasta convencer o ser convencido?",
opts:["Escucha activa","Empatía","Asertividad","Paralingüística"],
a:2,exp:"La asertividad es la convicción de defender opiniones propias de forma razonada evitando reacciones emocionales, hasta convencer a otros o ser convencidos de que otras opciones son mejores. Las tres herramientas de comunicación son: escucha activa, asertividad y empatía."},

{t:"T6 · Expresión oral",gi:5,trap:true,
q:"⚠ Trampa — ¿Qué elemento de la comunicación no verbal estudia específicamente las cualidades de la voz como volumen, entonación, modulación y velocidad?",
opts:["Kinesia","Proxémica","Gestualización","Paralingüística"],
a:3,exp:"La Paralingüística estudia todos los elementos que acompañan a las emisiones lingüísticas relacionados con la voz y la dicción: volumen, articulación, entonación, modulación, claridad, muletillas, énfasis, velocidad y tiempo. No es kinesia ni proxémica."},

// ── T7: EXPRESIÓN ESCRITA (19-21) ──
{t:"T7 · Expresión escrita",gi:6,trap:false,
q:"En el proceso de escritura, ¿cuál es la diferencia entre la fase 'Dispositio' y la fase 'Elocutio'?",
opts:["Dispositio es revisar; Elocutio es construir ideas","Dispositio es ordenar y planificar ideas mediante esquemas; Elocutio es redactar eligiendo la expresión lingüística","Dispositio es redactar; Elocutio es corregir","Son la misma fase con dos nombres distintos"],
a:1,exp:"Dispositio (Disposición): ordenar y planificar las ideas mediante esquemas, elegir el tipo de discurso. Elocutio (Redacción): elegir la expresión lingüística adecuada, elaborar borradores. Emendatio sería la revisión final."},

{t:"T7 · Expresión escrita",gi:6,trap:false,
q:"El texto argumentativo tiene un proceso propio de cuatro pasos. ¿Cuál es el segundo paso tras la enunciación?",
opts:["Conclusión","Refutación","Demostración","Revisión"],
a:2,exp:"El proceso argumentativo sigue el orden: Enunciación → Demostración → Refutación → Conclusión. En la Demostración se prueba la viabilidad de la tesis propuesta con evidencias claras y ordenadas."},

{t:"T7 · Expresión escrita",gi:6,trap:true,
q:"⚠ Trampa — ¿Qué propiedad textual se ocupa del uso correcto de puntuación, nexos, anáforas y conectores para enlazar las partes del texto?",
opts:["Adecuación","Coherencia","Cohesión","Gramática"],
a:2,exp:"La Cohesión se refiere al uso correcto de puntuación, nexos, anáforas y conectores. No confundir con Coherencia (selección y organización lógica de la información) ni con Adecuación (elección del registro apropiado según el destinatario)."},

// ── T8: LIDERAZGO (22-24) ──
{t:"T8 · Liderazgo",gi:7,trap:false,
q:"Según la teoría situacional de Hersey y Blanchard, ¿qué estilo aplica el líder cuando el subalterno tiene alta disposición para la tarea pero necesita apoyo en la relación (nivel R2)?",

{t:"T8 · Liderazgo",gi:7,trap:true,

// Índices de las preguntas por grupo (gi)
const GROUPS=Array.from({length:10},(_,i)=>QS.map((_,j)=>j).filter(j=>QS[j].gi===i));

let cur=0,ans=Array(QS.length).fill(null),rev=Array(QS.length).fill(false),secs=0,tid;
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function startTmr(){tid=setInterval(()=>{secs++;document.getElementById('tmr').textContent=fmt(secs)},1000)}
function updLive(){document.getElementById('lsc').textContent=ans.reduce((s,a,i)=>s+(rev[i]&&a===QS[i].a?1:0),0)}

function renderGrids(){
  GROUPS.forEach((idxs,gi)=>{
    const el=document.getElementById('g'+gi);
    if(!el)return;
    el.innerHTML=idxs.map(i=>{
      let c='qb';
      if(i===cur)c+=' cur';
      else if(rev[i])c+=ans[i]===QS[i].a?' ok':' ko';
      return `<button class="${c}" onclick="jump(${i})">${i+1}</button>`;
    }).join('');
  });
}

function renderQ(){
  const q=QS[cur];
  document.getElementById('prog').style.width=((cur+1)/QS.length*100)+'%';
  renderGrids();
  const L=['A','B','C','D'];
  let h=`<div class="qmeta">
    <span class="tbadge">${q.t}</span>
    ${q.trap?'<span class="trapbadge">⚠ Trampa</span>':''}
    <span class="qnum">${cur+1} / ${QS.length}</span>
  </div>
  <div class="qtxt">${q.q}</div>
  <div class="opts">`;
  q.opts.forEach((o,i)=>{
    let c='opt';
    if(rev[cur]){if(i===q.a)c+=' correct locked';else if(ans[cur]===i)c+=' wrong locked';}
    else if(ans[cur]===i)c+=' sel';
    h+=`<div class="${c}" onclick="pick(${i})">
      <div class="optl">${L[i]}</div>
      <div class="opttxt">${o}</div>
    </div>`;
  });
  h+='</div>';
  if(rev[cur]){
    const ok=ans[cur]===q.a;
    h+=`<div class="fb ${ok?'ok':'ko'}"><span class="fbicon">${ok?'✓':'✗'}</span><span>${q.exp}</span></div>`;
  }
  const done=rev.filter(Boolean).length;
  const corr=rev.filter((r,i)=>r&&ans[i]===QS[i].a).length;
  h+=`<div class="nav">
    <span class="navcnt">${done} respondidas · ${corr} correctas</span>
    <div class="navbtns">
      <button class="btn" onclick="go(-1)" ${cur===0?'disabled':''}>← Anterior</button>
      <button class="btn btnp" onclick="go(1)" ${ans[cur]===null?'disabled':''}>${cur===QS.length-1?'Ver resultado →':'Siguiente →'}</button>
    </div>
  </div>`;
  document.getElementById('main').innerHTML=h;
}

function pick(i){if(rev[cur])return;ans[cur]=i;rev[cur]=true;updLive();renderQ();renderGrids()}
function jump(i){cur=i;renderQ();renderGrids()}
function go(d){
  if(d===1&&cur===QS.length-1){showResult();return;}
  cur=Math.max(0,Math.min(QS.length-1,cur+d));renderQ();renderGrids();
}

function showResult(){
  clearInterval(tid);
  const correct=ans.reduce((s,a,i)=>s+(a===QS[i].a?1:0),0);
  const trapsOk=QS.reduce((s,q,i)=>s+(q.trap&&ans[i]===q.a?1:0),0);
  const trapTotal=QS.filter(q=>q.trap).length;
  const pct=Math.round(correct/QS.length*100);
  const nota=pct>=90?'Sobresaliente':pct>=75?'Notable':pct>=60?'Bien':pct>=50?'Aprobado':'Insuficiente';
  const icon=pct>=75?'🏆':pct>=50?'🎖️':'📚';
  document.getElementById('bodylayout').style.display='none';
  const ra=document.getElementById('resarea');ra.style.display='block';

  // Por tema
  const tnames=["T1 · Org. Internacionales","T2 · Apoyo psicológico","T3 · Material aéreo","T4 · Historia aviación","T5 · Dinámica de grupos","T6 · Expresión oral","T7 · Expresión escrita","T8 · Liderazgo","T9 · Valores militares","T10 · Técnicas de apoyo"];
  let tbh='';
  GROUPS.forEach((idxs,gi)=>{
    const ok=idxs.filter(i=>rev[i]&&ans[i]===QS[i].a).length;
    const n=idxs.length;
    const p=Math.round(ok/n*100);
    const col=p>=75?'#34d399':p>=50?'#fbbf24':'#f87171';
    tbh+=`<div class="tb-row"><div class="tb-name">${tnames[gi]}</div><div class="tb-bwrap"><div class="tb-b" style="width:${p}%;background:${col}"></div></div><div class="tb-sc" style="color:${col}">${ok}/${n}</div></div>`;
  });

  let rvh='';
  QS.forEach((q,i)=>{
    const ok=ans[i]===q.a;
    rvh+=`<div class="ritem"><div class="rtags"><span class="rtag ${ok?'tok':'tko'}">${ok?'✓ Correcta':'✗ Incorrecta'}</span>${q.trap?'<span class="rtag ttrap">Trampa</span>':''}<span class="rtag ttopic">${q.t}</span></div><div class="rq">${i+1}. ${q.q.replace('⚠ Trampa — ','')}</div><div class="ra">Correcta: <b>${['A','B','C','D'][q.a]}) ${q.opts[q.a]}</b></div></div>`;
  });

  ra.innerHTML=`<div class="res-wrap">
    <div class="res-card">
      <div class="res-icon">${icon}</div>
      <div class="res-title">Examen completado · Test 9</div>
      <div class="res-sub">10 temas × 3 preguntas · Tiempo: ${fmt(secs)}</div>
      <div class="res-pct">${pct}%</div>
      <div class="res-nota">${nota} · ${correct} de ${QS.length} correctas</div>
      <div class="sgrid">
        <div class="sbox"><div class="sn" style="color:#34d399">${correct}</div><div class="sl">Correctas</div></div>
        <div class="sbox"><div class="sn" style="color:#f87171">${QS.length-correct}</div><div class="sl">Incorrectas</div></div>
        <div class="sbox"><div class="sn" style="color:#fb923c">${trapsOk}/${trapTotal}</div><div class="sl">Trampas ok</div></div>
        <div class="sbox"><div class="sn" style="color:#fcd34d">${fmt(secs)}</div><div class="sl">Tiempo</div></div>
      </div>
      <button class="btn btnp" onclick="restart()">↺ Repetir test</button>
    </div>
    <div class="tb-card"><div class="tb-title">Resultados por tema (3 preguntas cada uno)</div>${tbh}</div>
    <div class="rev-card"><div class="rev-title">Revisión completa</div>${rvh}</div>
  </div>`;
}

function restart(){
  clearInterval(tid);cur=0;ans=Array(QS.length).fill(null);rev=Array(QS.length).fill(false);secs=0;
  document.getElementById('tmr').textContent='00:00';
  document.getElementById('lsc').textContent='0';
  document.getElementById('resarea').style.display='none';
  document.getElementById('bodylayout').style.display='flex';
  renderQ();renderGrids();startTmr();
}
renderQ();renderGrids();startTmr();
</script>
