agent_development_plan:
  mission_statement: >
    Crear una Progressive Web App (PWA) robusta, intuitiva y autogestionada para ayudar a los alumnos a prepararse para el Curso de Cabo 1.º del Ejército del Aire y del Espacio.
    La aplicación debe funcionar 100% offline, persistir el progreso de forma segura y aislar configuraciones obsoletas.
    El banco de preguntas se mantiene de forma inteligente y automatizada por un pipeline multiagente.
  agent_persona:
    name: Gemini Code Assist
    description: >
      Un asistente de ingeniería de software de clase mundial con amplia experiencia en desarrollo web front-end, PWAs, JavaScript moderno (ES6+),
      y diseño de arquitecturas de software limpias, escalables y pipelines multiagente en Python.
  feature_analysis:
    - feature: "PWA & Offline"
      development_tasks:
        - "Crear manifest.json con metadatos, iconos de máscara y atajos de teclado."
        - "Implementar service-worker.js con estrategia Stale-While-Revalidate."
        - "Implementar banner de actualización dinámica al detectar nuevas versiones del SW."
      involved_files:
        - manifest.json
        - service-worker.js
        - app.js
    - feature: "Modos de Práctica y Test"
      development_tasks:
        - "Implementar Test Normal con algoritmo de muestreo estratificado proporcional por temas."
        - "Implementar Repaso de Fallos persistente y Test por Temas (12 temas)."
        - "Implementar 3 Simulacros de examen estáticos con cálculo formal APTO/NO APTO y penalización de fallos (-0.33)."
      involved_files:
        - index.html
        - app.js
        - state.js
        - ui.js
        - questionManager.js
    - feature: "Lógica del Test y Visualización"
      development_tasks:
        - "Unificación y clasificación dinámica de temas en el cliente."
        - "Gestión del estado de test, puntuaciones y feedback interactivo inmediato."
        - "Mostrar la respuesta correcta y la explicación detallada (.feedback-explicacion) al cometer fallos, ampliando el retardo a 4 segundos."
      involved_files:
        - app.js
        - state.js
        - ui.js
        - style.css
    - feature: "Persistencia de Datos"
      development_tasks:
        - "Aislamiento de claves de localStorage con prefijo testCabo1State_."
        - "Guardado de récords, fallos acumulados y sesión en curso."
      involved_files:
        - storage.js
    - feature: "Pipeline Multiagente (Mantenimiento del Banco)"
      development_tasks:
        - "Desarrollar el script orquestador para coordinar secuencialmente a todos los agentes."
        - "Implementar el analizador de temario en docx para crear thematic_map.json."
        - "Implementar generador de preguntas (parsar docx, extraer html e integrar extra_questions.json)."
        - "Implementar validador estructural de preguntas de examen."
        - "Implementar calibración de dificultad (30% fácil, 50% media, 20% difícil) por percentiles de complejidad."
        - "Implementar deduplicación cruzada (similitud Jaccard de pregunta >0.65 y respuesta >0.75 o idéntica)."
        - "Implementar analizador de lagunas de conocimiento de temas."
        - "Implementar constructor de exámenes balanceados y suite de QA & Testing."
      involved_files:
        - agents/orchestrator.py
        - agents/material_analyzer.py
        - agents/question_generator.py
        - agents/validation.py
        - agents/difficulty_calibration.py
        - agents/duplicate_detection.py
        - agents/knowledge_gap.py
        - agents/exam_builder.py
        - agents/qa_testing.py
        - agents/html_extractor.js
  execution_plan:
    - phase: 1
      title: "Extracción y Consolidación de Datos (Backend Pipeline)"
      steps:
        - title: "Análisis del Temario"
          sub_steps:
            - "Mapear los temas oficiales mediante lectura de leyes en los docx de Temario."
        - title: "Generación de Preguntas"
          sub_steps:
            - "Extraer preguntas de los archivos HTML existentes de tests."
            - "Crear base de preguntas extra a mano para temas de baja cobertura (Historia, Material, Redacción)."
            - "Consolidar el pool inicial de preguntas."
    - phase: 2
      title: "Validación, Calibración y Deduplicación"
      steps:
        - title: "Validación de Datos"
          sub_steps:
            - "Filtrar preguntas con esquemas rotos o respuestas correctas inexistentes."
        - title: "Calibración y Limpieza"
          sub_steps:
            - "Calcular complejidad y asignar dificultades (fácil/media/difícil)."
            - "Aplicar algoritmo de deduplicación cruzada para limpiar repeticiones semánticas."
        - title: "Compilación de Simulacros"
          sub_steps:
            - "Construir preguntas.json y distribuir simulacros balanceados."
            - "Ejecutar pruebas de QA y generar reporte qa_report.md."
    - phase: 3
      title: "Lógica Frontend y Modos de Práctica"
      steps:
        - title: "Sistema Modular de Test"
          sub_steps:
            - "Desarrollar carga de preguntas e integración en los 4 modos de práctica."
            - "Implementar lógica de puntuación y persistencia de progreso."
        - title: "UX e Interacciones"
          sub_steps:
            - "Diseñar transiciones fluidas, tema oscuro, feedback sonoro e interacciones hápticas."
            - "Implementar atajos de teclado y sistema de restauración automática de sesión."
            - "Implementar visualización de explicaciones dinámicas de respuestas incorrectas."